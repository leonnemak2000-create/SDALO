
<style>
.gallery{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
}

.gallery img{
    width: 400px;
    height: 300px;
    border: 2px solid black;
    border-radius: 13px;
    box-shadow: 4px 7px 7px rgba(0, 0, 0, 0.2);
    cursor: pointer;
    margin: 10px;
    transition: 400ms;
    object-fit: cover;
}

.gallery img:hover{
    filter: grayscale(1);
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="gallery">
    <img src="Mammals/download (2).webp" alt="">
    <img src="Mammals/download (4).webp" alt="">
    <img src="Mammals/download (5).webp" alt="">
    <img src="Mammals/download (6).webp" alt="">
    <img src="Mammals/download (7).webp" alt="">
    <img src="Mammals/download (8).webp" alt="">
    <img src="Mammals/download (9).webp" alt="">
    <img src="Mammals/download (1).webp" alt="">
</div>

</body>
</html>
