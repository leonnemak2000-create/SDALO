
<style>
.gallery{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
}

.gallery img{
    width: 400px;
    height: 300px;
    border: 2px solid black;
    border-radius: 13px;
    box-shadow: 4px 7px 7px rgba(0, 0, 0, 0.2);
    cursor: pointer;
    margin: 10px;
    transition: 400ms;
    object-fit: cover;
}

.gallery img:hover{
    filter: grayscale(1);
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="gallery">
   
    <iframe width="560" height="315" src="https://www.youtube.com/embed/mGk5wmVG6WE?si=ubvu0dyPETCUPaWz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>

</body>
</html>
